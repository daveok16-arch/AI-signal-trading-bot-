# XAUUSD AI Scalping Signal System Configuration

# Data Configuration
data:
  symbol: "XAUUSD=X"
  interval: "1m"
  period: "7d"  # 7 days of 1-minute data from Yahoo Finance
  lookback_days: 7
  cache_dir: "data/cache"
  cache_ttl_minutes: 5
  max_retries: 3
  retry_delay: 5
  timezone: "UTC"
  market_hours:
    open: "00:00"
    close: "23:59"
    timezone: "UTC"

# Feature Engineering Configuration
features:
  technical:
    enabled: true
    indicators:
      - name: "sma"
        params: [5, 10, 20, 50, 100]
      - name: "ema"
        params: [5, 10, 20, 50]
      - name: "rsi"
        params: [14, 21]
      - name: "macd"
        params: {"fast": 12, "slow": 26, "signal": 9}
      - name: "bb"
        params: {"period": 20, "std": 2}
      - name: "atr"
        params: [14, 21]
      - name: "stoch"
        params: {"k": 14, "d": 3}
      - name: "williams_r"
        params: [14]
      - name: "cci"
        params: [20]
      - name: "adx"
        params: [14]
      - name: "obv"
        params: []
      - name: "mfi"
        params: [14]
      - name: "vwap"
        params: []
      - name: "supertrend"
        params: {"period": 10, "multiplier": 3}
      - name: "ichimoku"
        params: {"tenkan": 9, "kijun": 26, "senkou_b": 52}
  
  price_action:
    enabled: true
    patterns:
      - "pinbar"
      - "engulfing"
      - "doji"
      - "hammer"
      - "shooting_star"
      - "morning_star"
      - "evening_star"
      - "three_white_soldiers"
      - "three_black_crows"
      - "inside_bar"
      - "outside_bar"
    swing_detection:
      lookback: 5
      min_swing_pct: 0.001
  
  market_structure:
    enabled: true
    swing_lookback: 10
    bos_threshold: 0.0005
    choch_threshold: 0.0005
    fvg_min_gap: 0.0002
    order_block_lookback: 20
  
  volatility:
    enabled: true
    indicators:
      - "atr"
      - "natr"
      - "keltner"
      - "donchian"
      - "historical_vol"
      - "parkinson_vol"
      - "garman_klass_vol"
      - "yang_zhang_vol"
  
  momentum:
    enabled: true
    indicators:
      - "roc"
      - "mom"
      - "tsi"
      - "uo"
      - "kst"
      - "stoch_rsi"
  
  volume:
    enabled: true
    indicators:
      - "obv"
      - "vwap"
      - "mfi"
      - "cmf"
      - "eom"
      - "nvi"
      - "pvi"
      - "vpt"
      - "vwma"
  
  feature_selection:
    enabled: true
    method: "mutual_info"
    k_best: 50
    correlation_threshold: 0.95
    variance_threshold: 0.001

# Model Configuration
models:
  ensemble:
    enabled: true
    voting: "soft"
    weights: null
  
  xgboost:
    enabled: true
    params:
      n_estimators: 500
      max_depth: 6
      learning_rate: 0.01
      subsample: 0.8
      colsample_bytree: 0.8
      min_child_weight: 3
      gamma: 0.1
      reg_alpha: 0.1
      reg_lambda: 1.0
      random_state: 42
      n_jobs: -1
      early_stopping_rounds: 50
      eval_metric: "logloss"
  
  lightgbm:
    enabled: true
    params:
      n_estimators: 500
      max_depth: 6
      learning_rate: 0.01
      num_leaves: 31
      subsample: 0.8
      colsample_bytree: 0.8
      min_child_samples: 20
      reg_alpha: 0.1
      reg_lambda: 1.0
      random_state: 42
      n_jobs: -1
      verbosity: -1
  
  catboost:
    enabled: true
    params:
      iterations: 500
      depth: 6
      learning_rate: 0.01
      l2_leaf_reg: 3
      random_seed: 42
      thread_count: -1
      verbose: false
      early_stopping_rounds: 50
  
  random_forest:
    enabled: true
    params:
      n_estimators: 300
      max_depth: 10
      min_samples_split: 10
      min_samples_leaf: 5
      max_features: "sqrt"
      random_state: 42
      n_jobs: -1
  
  extra_trees:
    enabled: true
    params:
      n_estimators: 300
      max_depth: 10
      min_samples_split: 10
      min_samples_leaf: 5
      max_features: "sqrt"
      random_state: 42
      n_jobs: -1
  
  logistic_regression:
    enabled: true
    params:
      C: 1.0
      penalty: "l2"
      solver: "lbfgs"
      max_iter: 1000
      random_state: 42
      n_jobs: -1
  
  mlp:
    enabled: true
    params:
      hidden_layer_sizes: (128, 64, 32)
      activation: "relu"
      solver: "adam"
      alpha: 0.001
      learning_rate: "adaptive"
      learning_rate_init: 0.001
      max_iter: 500
      random_state: 42
      early_stopping: true
      validation_fraction: 0.1

# Target Configuration
target:
  type: "classification"
  horizon: 5  # minutes ahead
  threshold_long: 0.0015  # 0.15% for long
  threshold_short: -0.0015  # -0.15% for short
  neutral_zone: 0.0005  # 0.05% neutral zone
  labeling_method: "triple_barrier"
  triple_barrier:
    upper_mult: 2.0
    lower_mult: 2.0
    max_holding: 15
    vol_lookback: 20

# Walk-Forward Validation
walk_forward:
  enabled: true
  train_window: 5000  # bars
  test_window: 1000   # bars
  step_size: 500      # bars
  min_train_size: 3000
  expanding_window: false
  purge_gap: 10
  embargo_pct: 0.01

# Backtesting Configuration
backtest:
  initial_capital: 100000
  position_size: 0.1  # 10% of capital per trade
  max_positions: 1
  commission: 0.0001  # 0.01% per trade
  slippage: 0.0001    # 0.01% slippage
  stop_loss_pct: 0.005  # 0.5%
  take_profit_pct: 0.01  # 1.0%
  trailing_stop: true
  trailing_activation: 0.005
  trailing_distance: 0.003
  max_holding_minutes: 15
  max_daily_trades: 50
  max_daily_loss_pct: 0.02
  max_drawdown_pct: 0.15
  risk_per_trade: 0.01
  position_sizing: "kelly"
  kelly_fraction: 0.5
  min_confidence: 0.55
  min_risk_reward: 1.5
  max_spread_pct: 0.0005
  session_filter:
    enabled: true
    sessions:
      - name: "london"
        start: "08:00"
        end: "17:00"
      - name: "new_york"
        start: "13:00"
        end: "22:00"
      - name: "overlap"
        start: "13:00"
        end: "17:00"

# Signal Generation
signals:
  confidence_threshold: 0.55
  min_risk_reward: 1.5
  consensus_threshold: 0.6
  voting_method: "weighted"
  signal_smoothing: 3
  min_hold_minutes: 2
  max_signals_per_hour: 12
  cooldown_minutes: 5
  trend_filter:
    enabled: true
    ma_period: 200
    slope_threshold: 0.0001
  volatility_filter:
    enabled: true
    atr_threshold: 0.001
  volume_filter:
    enabled: true
    volume_ma_period: 20
    volume_threshold: 1.2
  session_filter:
    enabled: true
    allowed_sessions: ["london", "new_york", "overlap"]
  news_filter:
    enabled: false
    api_key: ""
    impact_threshold: "high"

# Performance Evaluation
evaluation:
  metrics:
    - "total_return"
    - "annualized_return"
    - "sharpe_ratio"
    - "sortino_ratio"
    - "calmar_ratio"
    - "max_drawdown"
    - "win_rate"
    - "profit_factor"
    - "expectancy"
    - "avg_trade"
    - "max_consecutive_wins"
    - "max_consecutive_losses"
    - "avg_win"
    - "avg_loss"
    - "risk_reward_ratio"
    - "sharpe_ratio_annual"
    - "sortino_ratio_annual"
    - "recovery_factor"
    - "ulcer_index"
    - "var_95"
    - "cvar_95"
    - "tail_ratio"
    - "gain_to_pain_ratio"
  benchmark: "buy_hold"
  rolling_window: 252
  bootstrap_iterations: 1000
  confidence_level: 0.95

# Model Training
training:
  test_size: 0.2
  validation_size: 0.1
  random_state: 42
  stratify: true
  class_weight: "balanced"
  cv_folds: 5
  cv_strategy: "time_series_split"
  early_stopping: true
  patience: 50
  min_delta: 0.0001
  feature_importance_top_n: 20
  save_feature_importance: true
  save_predictions: true
  save_models: true
  model_dir: "models"

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/xauusd_scalper.log"
  max_bytes: 10485760
  backup_count: 10
  console: true
  json_format: false
  log_dir: "logs"
  log_levels:
    src.data: "DEBUG"
    src.features: "DEBUG"
    src.models: "INFO"
    src.backtest: "INFO"
    src.signals: "INFO"
    src.eval: "INFO"
    src.api: "INFO"
    src.dashboard: "INFO"

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  timeout: 30
  cors_origins: ["*"]
  rate_limit: 100
  auth_enabled: false
  api_key: ""

# Dashboard Configuration
dashboard:
  host: "0.0.0.0"
  port: 8501
  theme: "dark"
  refresh_interval: 30
  chart_height: 600
  chart_width: 1200
  max_candles: 500
  refresh_data_interval: 60
  auto_refresh: true
  theme_color: "#00ff88"

# Risk Management
risk:
  max_position_size: 0.1
  max_daily_loss: 0.02
  max_drawdown: 0.15
  max_positions: 1
  max_daily_trades: 50
  risk_per_trade: 0.01
  max_leverage: 1.0
  margin_requirement: 0.01
  stop_out_level: 0.5

# Data Sources
sources:
  yahoo:
    enabled: true
    symbol: "XAUUSD=X"
    interval: "1m"
    period: "7d"
  # Add more sources as needed
  # alphavantage:
  #   enabled: false
  #   api_key: ""
  # twelve_data:
  #   enabled: false
  #   api_key: ""

# Model Persistence
pipeline:
  save_preprocessor: true
  save_feature_names: true
  save_feature_importance: true
  version: "1.0.0"
  metadata:
    author: "XAUUSD Scalper"
    version: "1.0.0"
    description: "AI-Powered XAUUSD Scalping Signal System"
